name: Cypress Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate API Allure report
        run: npm run report:allure:api
        env:
          CYPRESS_adminEmail: fulano@qa.com
          CYPRESS_adminPassword: teste

      - name: Upload API screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload API Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: allure-report
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate UI Allure report
        run: npm run report:allure:ui
        env:
          CYPRESS_adminEmail: fulano@qa.com
          CYPRESS_adminPassword: teste

      - name: Upload UI screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload UI Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-report
          path: allure-report
          if-no-files-found: ignore
